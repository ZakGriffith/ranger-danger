<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark rounded tile, matches the landing background -->
  <rect width="32" height="32" rx="6" fill="#05070d"/>

  <!-- Bow body — green curve opening to the right -->
  <path d="M 9 5 Q 22 16 9 27"
        stroke="#3ddc6e" stroke-width="2.4"
        fill="none" stroke-linecap="round"/>

  <!-- Bowstring — pulled back slightly toward the arrow nock -->
  <path d="M 9 5 L 12 16 L 9 27"
        stroke="#9bd1ad" stroke-width="1"
        fill="none" stroke-linecap="round"/>

  <!-- Arrow shaft -->
  <line x1="12" y1="16" x2="24" y2="16"
        stroke="#cfe6d4" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Arrowhead -->
  <polygon points="24,12 29,16 24,20" fill="#3ddc6e"/>

  <!-- Fletching at the nock -->
  <polygon points="11,13 13,16 11,19" fill="#1a5c2e"/>
</svg>
